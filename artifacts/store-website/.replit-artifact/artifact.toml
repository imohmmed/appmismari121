kind = "web"
previewPath = "/"
title = "Plus Store"
version = "1.0.0"
id = "artifacts/store-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21923

[services.development]
run = "pnpm --filter @workspace/store-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/store-website", "run", "build" ]
publicDir = "artifacts/store-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21923"
BASE_PATH = "/"
