kind = "mobile"
previewPath = "/plus-app/"
title = "Plus App"
version = "1.0.0"
id = "artifacts/plus-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/plus-app/" ]
localPort = 21900

[services.development]
run = "pnpm --filter @workspace/plus-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/plus-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/plus-app", "run", "serve" ]

[services.env]
PORT = "21900"
BASE_PATH = "/plus-app/"
